# HTTP: ACME challenge + redirect everything to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kukumba.space www.kukumba.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: SPA + API + WebSocket
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kukumba.space www.kukumba.space;

    ssl_certificate     /etc/letsencrypt/live/kukumba.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kukumba.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Docker's embedded DNS — lets nginx start even before the API is up and
    # re-resolve the "api" service at request time.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API (NestJS global prefix is /api → full path forwarded)
    location /api/ {
        set $upstream_api api:3000;
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (realtime: online, live bets, chat, notifications)
    location /socket.io/ {
        set $upstream_api api:3000;
        proxy_pass http://$upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
