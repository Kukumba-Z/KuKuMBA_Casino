# ─────────────────────────────────────────────────────────────
# KuKuMBA — production stack (Postgres + Redis + API + nginx + certbot)
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
# ─────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kukumba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-kukumba}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kukumba} -d ${POSTGRES_DB:-kukumba}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      API_PORT: 3000
      # Built from POSTGRES_* so the DB password has a SINGLE source of truth
      # (prevents the classic DATABASE_URL/POSTGRES_PASSWORD mismatch → P1000).
      # This overrides any DATABASE_URL that may sit in .env.production.
      DATABASE_URL: postgresql://${POSTGRES_USER:-kukumba}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kukumba}?schema=public
      REDIS_URL: redis://redis:6379
      # Where uploaded ticket attachments live — backed by the "uploads" volume
      # below so files persist across container rebuilds/redeploys.
      UPLOADS_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - '3000'

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    # nginx start (with self-signed bootstrap) + periodic reload is handled by
    # the image entrypoint (deploy/web/entrypoint.sh).

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    # renew twice a day (no-op until ~30 days before expiry)
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  uploads:
